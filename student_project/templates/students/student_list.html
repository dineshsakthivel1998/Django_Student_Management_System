{% extends 'students/base.html' %}

{% block content %}

<div class="d-flex justify-content-between mb-3">
    <h4>Student List</h4>
    <a href="{% url 'student_create' %}" class="btn btn-primary">
        + Add Student
    </a>
</div>

<div class="card shadow">
    <div class="card-body p-0">
        <table class="table table-striped table-hover mb-0">
            <thead class="table-dark">
                <tr>
                    <th>id</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th width="220">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for student in students %}
                <tr>
                    <td>{{student.id}}</td>
                    <td>{{ student.name }}</td>
                    <td>{{ student.email }}</td>
                    <td>
                        <a href="{% url 'student_detail' student.id %}" class="btn btn-info btn-sm">
                            View
                        </a>
                        <a href="{% url 'student_update' student.id %}" class="btn btn-warning btn-sm">
                            Edit
                        </a>
                        <a href="{% url 'student_delete' student.id %}" class="btn btn-danger btn-sm">
                            Delete
                        </a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="text-center p-4">
                        No students added yet.
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

{% endblock %}
